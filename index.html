<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wearmyf</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #222;
      margin-bottom: 30px;
    }

    .product-card {
      background: #fff;
      max-width: 320px;
      margin: auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .product-card img {
      width: 100%;
      border-radius: 12px;
    }

    .product-name {
      font-size: 24px;
      font-weight: bold;
      margin-top: 15px;
      color: #111;
    }

    .price {
      font-size: 22px;
      color: green;
      margin: 10px 0;
    }

    .buy-btn {
      display: inline-block;
      background: green;
      color: white;
      padding: 12px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      margin-top: 10px;
    }

    .buy-btn:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>

  <h1>Wearmyf Product</h1>

  <div class="product-card">
    <img src="IMG-20260328-WA0057.jpg" alt="Product Image">
    <div class="product-name">Oversized T-Shirt</div>
    <div class="price">₹699</div>
    <a class="buy-btn" href="https://wa.me/919596401573?text=Hello%20bhai,%20mujhe%20ye%20T-Shirt%20order%20karni%20hai" target="_blank">
      Buy on WhatsApp
    </a>
  </div>

</body>
</html>
