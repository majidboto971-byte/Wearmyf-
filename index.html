<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Product Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .product-card {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .product-name {
      font-size: 22px;
      font-weight: bold;
      margin: 15px 0 10px;
    }

    .price {
      color: green;
      font-size: 20px;
      margin-bottom: 15px;
    }

    .buy-btn {
      display: inline-block;
      background: green;
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
    }

    .buy-btn:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>

  <h1>My Product</h1>

  <div class="product-card">
    <img src="product.jpg" alt="Product Image">
    <div class="product-name">My Product Name</div>
    <div class="price">₹499</div>
    <a class="buy-btn" href="https://wa.me/919876543210?text=Hello%20bhai,%20mujhe%20ye%20product%20chahiye" target="_blank">
      Buy on WhatsApp
    </a>
  </div>

</body>
</html>
