<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WearMyF - T-Shirt Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 18px;
        }
        .container {
            padding: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            margin: 15px;
            display: inline-block;
            width: 250px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        .btn {
            background: black;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    WearMyF T-Shirt Store
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Tshirt">
        <h3>Printed T-Shirt</h3>
        <p>₹599</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Tshirt">
        <h3>Black T-Shirt</h3>
        <p>₹699</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Tshirt">
        <h3>Custom Print T-Shirt</h3>
        <p>₹799</p>
        <button class="btn">Buy Now</button>
    </div>
</div>

<footer>
    © 2026 WearMyF. All Rights Reserved.
</footer>

</body>
</html>
